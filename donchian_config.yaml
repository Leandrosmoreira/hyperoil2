# Donchian Ensemble Trend Following — 25 Assets / 5 Classes
# Based on Zarattini, Pagani & Barbon (Swiss Finance Institute, 2025)
# All tickers verified on Hyperliquid HIP-3 dexes (xyz, hyna) — 2026-04-09

execution_mode: paper

# Order entry policy (PROJECT RULE):
# All entries MUST be maker post-only (limit_maker). Taker fees on trade.xyz
# HIP-3 are 5-10x maker fees and destroy edge on a high-frequency strategy.
# Exits triggered by stops MAY use taker (safety > savings).
order_policy:
  entry_order_type: limit_maker     # post-only, never crosses the book
  exit_order_type: limit_maker      # also post-only by default
  emergency_exit_order_type: market # only when trailing stop hit + would miss
  post_only_retry_offset_bps: 1.0   # if rejected, requote 1 bp better
  post_only_max_retries: 3
  unfilled_cancel_after_bars: 1     # cancel limit if not filled in 1 bar (4h)

