      dex_prefix: xyz
      asset_class: forex
      yfinance_ticker: DX-Y.NYB   # ICE DXY index (~97 range), matches xyz:DXY oracle
                                  # NOT UUP (an ETF tracking DXY at ~$28; wrong magnitude)
      needs_ffill: true
    - symbol: COPPER
      hl_ticker: COPPER
      dex_prefix: xyz
      asset_class: forex   # Listed under forex slot to keep balance; or move to commodity
      yfinance_ticker: HG=F
      needs_ffill: true

signal:
  lookbacks: [30, 60, 120, 180, 360, 540, 900, 1500, 2160]
  ema_period: 200
  min_score_entry: 0.33
  interval: "4h"

risk_parity:
  vol_window: 30
  rebal_threshold: 0.20
  rebal_frequency: weekly

sizing:
  vol_target_annual: 0.25
  vol_factor_cap: 3.0
  max_position_pct: 0.40
  cash_reserve_pct: 0.20
  score_thresholds:
    half_pos: 0.33
    full_pos: 0.55
    lever_1_5x: 0.55
    lever_2x: 0.70
    lever_3x: 0.85

risk:
  max_drawdown_pct: 0.20
  dd_reduce_15_pct: 0.15
  dd_reduce_10_pct: 0.10
  min_cash_pct: 0.10
  trailing_stop_never_recedes: true

backtest:
  start_date: "2023-04-01"
  end_date: "2026-04-09"
  min_train_months: 9
  n_trials: 200
  initial_capital: 1000.0
  # trade.xyz HIP-3 fees (verified 2026-04-09):
  # - Standard mode (crypto, MSTR): taker 9 bps / maker 3 bps
  # - Growth mode (commodities, stocks, indices, FX): taker 0.9 bps / maker 0.3 bps
  # Project rule: ALL entries are maker post-only. Backtest models entries at maker.
  # Stop exits may pay taker — slippage_bps captures that.
  fee_taker_bps: 5.0     # only used for emergency exits
  fee_maker_bps: 1.5     # blended: ~half crypto (3) half growth (0.3) — ENTRIES use this
  slippage_bps: 2.0      # accounts for occasional stop-out at taker

storage:
  parquet_dir: data/donchian
  sqlite_path: data/hyperoil.db
  jsonl_dir: data/jsonl

observability:
  health_port: 9091
  log_level: INFO
